name: CPE Fleet Report Pipeline
on:
  push:
    branches:
      - main
jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytest
      - name: Run tests
        run: pytest test_device_report.py -v
      - name: Run fleet report
        env:
          JAMF_API_TOKEN: ${{ secrets.JAMF_API_TOKEN }}
        run: python device_report.py
