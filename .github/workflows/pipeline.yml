name: CPE Fleet Report Pipeline

on:
  push:
    branches:
      - main

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run fleet report
        run: python device_report.py
